services:
  - type: web
    name: ai-train-traffic-control
    runtime: node
    rootDir: .
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: SIMULATION_INTERVAL_MS
        value: 5000
      - key: FRONTEND_URL
        sync: false   # Set to your Render URL after first deploy
