services:
  # ── 1. Main Web Service: Backend (Express) + Frontend (React) ──
  - type: web
    name: ai-train-traffic-control
    runtime: node
    rootDir: .
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: SIMULATION_INTERVAL_MS
        value: 5000
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false   # Set to the ai-service Render URL after it's deployed

  # ── 2. AI Microservice: Python FastAPI (XGBoost + LSTM predictions) ──
  - type: web
    name: ai-train-ai-service
    runtime: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        sync: false   # Set to your main Render service URL
      - key: DEBUG
        value: "false"
